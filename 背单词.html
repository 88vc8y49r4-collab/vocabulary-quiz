body::before { content: ''; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.35); z-index: -1; }
.app { max-width: 520px; margin: 0 auto; padding: 0 16px 40px; }

/* 导航栏 */
.nav { display: flex; background: rgba(255,255,255,0.25); backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px); border-radius: 0 0 16px 16px; overflow: hidden; box-shadow: 0 2px 20px rgba(0,0,0,0.10); position: sticky; top: 0; z-index: 100; }
.nav-tab { flex: 1; text-align: center; padding: 16px 8px; cursor: pointer; font-size: 15px; font-weight: 500; color: rgba(255,255,255,0.92); border-bottom: 3px solid transparent; transition: all 0.2s; user-select: none; }
.nav-tab.active { color: #1a73e8; border-bottom-color: #1a73e8; }
.nav-tab .badge { display: inline-block; background: #e74c3c; color: #fff; font-size: 11px; padding: 1px 7px; border-radius: 10px; margin-left: 4px; min-width: 20px; text-align: center; }

/* 单词卡片 */
.card-area { margin-top: 32px; display: flex; flex-direction: column; align-items: center; }
.word-card { background: rgba(255,255,255,0.22); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); border-radius: 20px; padding: 48px 32px 36px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); text-align: center; width: 100%; }
.word-text { font-size: 36px; font-weight: bold; color: #fff; margin-bottom: 8px; letter-spacing: 1px; }
.word-pos { font-size: 14px; color: rgba(255,255,255,0.88); margin-bottom: 12px; }
.speak-btn { display: inline-flex; align-items: center; justify-content: center; width: 48px; height: 48px; border-radius: 50%; background: rgba(255,255,255,0.25); backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px); border: 1px solid rgba(255,255,255,0.4); cursor: pointer; font-size: 24px; transition: background 0.2s; margin-bottom: 8px; }
.speak-btn:hover { background: rgba(52,152,219,0.25); }
.speak-btn:active { transform: scale(0.95); }
.speak-btn.speaking { background: #3498db; color: #fff; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(52,152,219,0.4); } 50% { box-shadow: 0 0 0 16px rgba(52,152,219,0); } }

/* 选项按钮 */
.options { margin-top: 24px; width: 100%; display: flex; flex-direction: column; gap: 12px; }
.opt-btn { width: 100%; padding: 16px 20px; border-radius: 14px; border: 1.5px solid rgba(255,255,255,0.4); background: rgba(255,255,255,0.25); backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px); font-size: 17px; cursor: pointer; text-align: center; color: #fff; font-family: inherit; }
.opt-btn:hover:not(.disabled) { border-color: rgba(52,152,219,0.7); background: rgba(52,152,219,0.15); }
.opt-btn.correct { border-color: #27ae60; background: rgba(39,174,96,0.55); color: #fff; font-weight: bold; }
.opt-btn.wrong { border-color: #e74c3c; background: rgba(231,76,60,0.55); color: #fff; font-weight: bold; }
.opt-btn.show-correct { border-color: #27ae60; background: rgba(39,174,96,0.55); color: #fff; font-weight: bold; }
.opt-btn.disabled { pointer-events: none; }

/* 反馈 + 继续按钮 */
.feedback { margin-top: 20px; text-align: center; min-height: 60px; }
.feedback .msg { font-size: 17px; font-weight: 600; margin-bottom: 10px; }
.feedback .msg.correct-msg { color: #27ae60; }
.feedback .msg.wrong-msg { color: #e74c3c; }
.next-btn { padding: 12px 36px; border-radius: 25px; background: #3498db; color: #fff; border: none; font-size: 16px; cursor: pointer; font-weight: 500; font-family: inherit; transition: all 0.2s; display: none; }
.next-btn:hover { background: #2980b9; }
.next-btn.show { display: inline-block; }

/* 搜索结果 */
.search-box { margin-top: 24px; position: relative; }
.search-input { width: 100%; padding: 14px 20px 14px 44px; border-radius: 24px; border: 1.5px solid rgba(255,255,255,0.4); font-size: 16px; outline: none; font-family: inherit; background: rgba(255,255,255,0.3); backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px); transition: border-color 0.2s; color: #fff; }
.search-input::placeholder { color: rgba(255,255,255,0.55); }
.search-input:focus { border-color: #3498db; }
.search-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); font-size: 18px; color: rgba(255,255,255,0.55); }
.search-results { margin-top: 16px; }
.search-item { background: rgba(255,255,255,0.25); backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px); border-radius: 14px; padding: 16px 20px; margin-bottom: 8px; box-shadow: 0 1px 8px rgba(0,0,0,0.06); display: flex; justify-content: space-between; align-items: center; }
.search-item .word-info { flex: 1; }
.search-item .sword { font-size: 18px; font-weight: 600; color: #fff; }
.search-item .smeaning { font-size: 15px; color: rgba(255,255,255,0.92); margin-top: 2px; }
.search-item .splay-btn { width: 38px; height: 38px; border-radius: 50%; background: rgba(255,255,255,0.3); border: 1px solid rgba(255,255,255,0.4); cursor: pointer; font-size: 18px; flex-shrink: 0; transition: background 0.2s; }
.search-item .splay-btn:hover { background: rgba(52,152,219,0.3); }
.no-results { text-align: center; color: rgba(255,255,255,0.82); padding: 40px 0; font-size: 15px; }

/* 错题本 */
.wrong-list { margin-top: 20px; }
.wrong-item { background: rgba(255,255,255,0.25); backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px); border-radius: 14px; padding: 16px 20px; margin-bottom: 8px; box-shadow: 0 1px 8px rgba(0,0,0,0.06); display: flex; justify-content: space-between; align-items: center; }
.wrong-item .wrong-info { flex: 1; }
.wrong-item .wrong-word { font-size: 18px; font-weight: 600; color: #fff; }
.wrong-item .wrong-meaning { font-size: 14px; color: rgba(255,255,255,0.92); margin-top: 2px; }
.wrong-item .wrong-count { font-size: 12px; color: #e74c3c; }
.empty-state { text-align: center; padding: 60px 0; color: rgba(255,255,255,0.82); font-size: 15px; }
.empty-state .emoji { font-size: 48px; margin-bottom: 12px; }

/* 错题复习模式 */
.review-badge { display: inline-block; background: #f39c12; color: #fff; padding: 4px 12px; border-radius: 12px; font-size: 13px; margin-bottom: 12px; }
.exit-review-btn { margin-top: 10px; padding: 8px 20px; border-radius: 20px; background: rgba(255,255,255,0.2); backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px); color: rgba(255,255,255,0.95); border: 1px solid rgba(255,255,255,0.4); cursor: pointer; font-size: 14px; font-family: inherit; }

// ---- 状态 ----
let quizQueue = [];
let currentWord = null;
let isReviewMode = false;
let reviewQueue = [];

let historyIndex = -1;       // 当前在历史中的位置
let viewingHistory = false;  // 是否正在查看历史单词（非答题模式）
let autoAdvanceTimer = null; // 答对后自动跳转的定时器

// ---- 工具函数 ----
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getStats() {
  try { return JSON.parse(localStorage.getItem('vocab_stats') || '{"total":0,"correct":0,"wrongIds":[]}'); }
  catch(e) { return {total:0, correct:0, wrongIds:[]}; }
}
function saveStats(s) { localStorage.setItem('vocab_stats', JSON.stringify(s)); }

function getWrongWords() {
  try { return JSON.parse(localStorage.getItem('vocab_wrong') || '[]'); }
  catch(e) { return []; }
}
function saveWrongWords(w) { localStorage.setItem('vocab_wrong', JSON.stringify(w)); }

// ---- 发音 ----
let _speakRef = null;      // 保持引用防止被浏览器垃圾回收
let _voicesReady = false;  // 浏览器语音引擎是否已就绪

// 预加载语音列表 — Chrome 异步加载 voices，必须等 voiceschanged 后才能正常发音
function initSpeech() {
  if (!('speechSynthesis' in window)) return;

  const loadVoices = () => {
    const voices = speechSynthesis.getVoices();
    if (voices.length > 0) {
      _voicesReady = true;
      // 预热：朗读一个极短的静默内容，激活 Chrome 的音频通道
      const warm = new SpeechSynthesisUtterance('');
      warm.volume = 0;
      warm.rate = 1;
      // 挑选一个英文语音，提升发音质量
      const enVoice = voices.find(v => v.lang.startsWith('en')) || voices[0];
      if (enVoice) warm.voice = enVoice;
      speechSynthesis.speak(warm);
    }
  };

  // Chrome 在首次调用 getVoices() 后才开始加载语音列表
  loadVoices();
  // 如果语音列表还未加载完成，监听 voiceschanged 事件
  speechSynthesis.addEventListener('voiceschanged', loadVoices, { once: true });
}

function speak(word) {
  if (!('speechSynthesis' in window)) return null;

  // Chrome 的 speechSynthesis.cancel() 有严重 bug：
  // cancel 后立即 speak 会导致单词开头被截断（只能听到后半部分）。
  // 解决方案：不主动 cancel，直接 speak — 浏览器会自动中断前一个朗读。
  // 仅在队列堵塞时（pending 状态）取消队列，此时 speaking 为 false，不会触发截断 bug。
  if (speechSynthesis.pending && !speechSynthesis.speaking) {
    speechSynthesis.cancel();
  }

  const u = new SpeechSynthesisUtterance(word);
  u.lang = 'en-US';
  u.rate = 0.75;
  u.pitch = 1;
  u.volume = 1;

  // 如果有英文语音可用，指定使用它
  if (_voicesReady) {
    const voices = speechSynthesis.getVoices();
    const enVoice = voices.find(v => v.lang.startsWith('en'));
    if (enVoice) u.voice = enVoice;
  }

  // 保持引用防止垃圾回收导致发音中断
  _speakRef = u;
  speechSynthesis.speak(u);

  return u;
}

// ---- 选项生成 ----
function generateOptions(correctWord) {
  const correct = correctWord.meaning;
  const others = WORD_BANK.filter(w => w.word !== correctWord.word && w.meaning !== correct);
  const shuffled = shuffle(others);
  const distractors = [];
  const seenMeanings = new Set([correct]);
  for (const w of shuffled) {
    if (distractors.length >= 3) break;
    if (!seenMeanings.has(w.meaning)) {
      distractors.push(w.meaning);
      seenMeanings.add(w.meaning);
    }
  }
  while (distractors.length < 3) {
    const fallback = '——';
    if (!seenMeanings.has(fallback + distractors.length)) {
      distractors.push(fallback + distractors.length);
    }
  }
  return shuffle([correct, ...distractors]);
}

// ---- 加载新单词 ----
function loadNewWord() {
  isAnswered = false;
  viewingHistory = false;
  if (quizQueue.length === 0) quizQueue = shuffle(WORD_BANK);
  currentWord = quizQueue.pop();

  // 将当前单词加入历史记录
  // 如果不在历史末尾，先截断再添加（防止分支历史）
  if (historyIndex < wordHistory.length - 1) {
    wordHistory = wordHistory.slice(0, historyIndex + 1);
  }
  wordHistory.push({word: currentWord.word, meaning: currentWord.meaning, phonetic: currentWord.phonetic, pos: currentWord.pos, answered: false});
  historyIndex = wordHistory.length - 1;

  // 使用 GSAP 淡入淡出动画更新内容
  animateWordTransition(() => {
    document.getElementById('word-text').textContent = currentWord.word;
    document.getElementById('word-pos').textContent = currentWord.pos || '';
    document.getElementById('feedback-msg').textContent = '';
    document.getElementById('feedback-msg').className = 'msg';
    document.getElementById('next-btn').classList.remove('show');

    const opts = generateOptions(currentWord);
    const optsDiv = document.getElementById('options');
    optsDiv.innerHTML = '';
    opts.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'opt-btn';
      btn.textContent = opt;
      btn.addEventListener('click', () => selectAnswer(opt, btn));
      optsDiv.appendChild(btn);
    });

    updateNavArrows();
  });
}

// ---- 导航箭头：显示/隐藏 ----
function updateNavArrows() {
  const prevBtn = document.getElementById('nav-prev');
  if (historyIndex <= 0) {
    prevBtn.classList.add('hidden');
  } else {
    prevBtn.classList.remove('hidden');
  }
}

// ---- 导航箭头：返回上一个单词 ----
function goBack() {
  if (historyIndex <= 0) return;
  if (autoAdvanceTimer) { clearTimeout(autoAdvanceTimer); autoAdvanceTimer = null; }
  historyIndex--;
  viewingHistory = true;
  showHistoryWord();
}

// ---- 导航箭头：前进到下一个单词 ----
function goForward() {
  if (autoAdvanceTimer) { clearTimeout(autoAdvanceTimer); autoAdvanceTimer = null; }
  if (historyIndex < wordHistory.length - 1) {
    // 历史中有下一个单词，前进到它
    historyIndex++;
    viewingHistory = true;
    showHistoryWord();
  } else {
    // 已经在历史末尾，加载新单词
    viewingHistory = false;
    loadNewWord();
  }
}

// ---- 显示历史中的单词 ----
function showHistoryWord() {
  const histWord = wordHistory[historyIndex];
  currentWord = histWord;

  animateWordTransition(() => {
    document.getElementById('word-text').textContent = histWord.word;
    document.getElementById('word-pos').textContent = histWord.pos || '';

    const opts = generateOptions(histWord);
    const optsDiv = document.getElementById('options');
    optsDiv.innerHTML = '';

    if (histWord.answered) {
      // 已答过的单词：只读模式，显示正确答案
      isAnswered = true;
      document.getElementById('feedback-msg').textContent = '📋 已答单词 —— 正确答案：' + histWord.meaning;
      document.getElementById('feedback-msg').className = 'msg';
      document.getElementById('next-btn').classList.remove('show');

      opts.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'opt-btn disabled';
        if (opt === histWord.meaning) {
          btn.classList.add('show-correct');
        }
        btn.textContent = opt;
        optsDiv.appendChild(btn);
      });
    } else {
      // 未答过的单词：恢复答题模式
      isAnswered = false;
      viewingHistory = false;
      document.getElementById('feedback-msg').textContent = '';
      document.getElementById('feedback-msg').className = 'msg';
      document.getElementById('next-btn').classList.remove('show');

      opts.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'opt-btn';
        btn.textContent = opt;
        btn.addEventListener('click', () => selectAnswer(opt, btn));
        optsDiv.appendChild(btn);
      });
    }

    updateNavArrows();
  });
}

// ---- 选择答案 ----
function selectAnswer(selected, btnEl) {
  if (isAnswered) return;
  isAnswered = true;

  // 在历史中标记该单词已作答
  if (historyIndex >= 0 && historyIndex < wordHistory.length && wordHistory[historyIndex].word === currentWord.word) {
    wordHistory[historyIndex].answered = true;
  }

  const correct = currentWord.meaning;
  const isCorrect = selected === correct;
  const allBtns = document.querySelectorAll('#options .opt-btn');

  allBtns.forEach(b => b.classList.add('disabled'));

  const stats = getStats();
  stats.total++;

  if (isCorrect) {
    btnEl.classList.add('correct');
    stats.correct++;
    document.getElementById('feedback-msg').textContent = '✅ 正确！太棒了！';
    document.getElementById('feedback-msg').className = 'msg correct-msg';
    saveStats(stats);
    updateStats();
    // 清除之前的定时器，设置新的自动跳转
    if (autoAdvanceTimer) clearTimeout(autoAdvanceTimer);
    autoAdvanceTimer = setTimeout(() => { autoAdvanceTimer = null; loadNewWord(); updateStats(); }, 1200);
  } else {
    btnEl.classList.add('wrong');
    allBtns.forEach(b => { if (b.textContent === correct) b.classList.add('show-correct'); });
    document.getElementById('feedback-msg').textContent = '❌ 正确答案是：' + correct;
    document.getElementById('feedback-msg').className = 'msg wrong-msg';
    document.getElementById('next-btn').classList.add('show');

    // 加入错题本
    const wrongWords = getWrongWords();
    const existing = wrongWords.find(w => w.word === currentWord.word);
    if (existing) {
      existing.wrongCount++;
      existing.lastWrong = new Date().toISOString().split('T')[0];
    } else {
      wrongWords.push({
        word: currentWord.word,
        meaning: currentWord.meaning,
        phonetic: currentWord.phonetic,
        pos: currentWord.pos,
        wrongCount: 1,
        lastWrong: new Date().toISOString().split('T')[0]
      });
    }
    stats.wrongIds = wrongWords.map(w => w.word);
    saveWrongWords(wrongWords);
    saveStats(stats);
    updateStats();
    updateWrongBadge();
    if (document.getElementById('page-wrong').classList.contains('active')) renderWrongList();
  }
}

// ---- 下一题 ----
document.getElementById('next-btn').addEventListener('click', () => {
  if (autoAdvanceTimer) { clearTimeout(autoAdvanceTimer); autoAdvanceTimer = null; }
  loadNewWord();

});

// ---- 更新统计 ----
function updateStats() {
  const stats = getStats();
  const wrongWords = getWrongWords();
  document.getElementById('stat-total').textContent = stats.total;
  document.getElementById('stat-correct').textContent = stats.correct;
  document.getElementById('stat-wrong-count').textContent = wrongWords.length;
  if (stats.total > 0) {
    document.getElementById('stat-rate').textContent = Math.round(stats.correct / stats.total * 100) + '%';
  }
  updateWrongBadge();
}

// ---- 错题标记 ----
function updateWrongBadge() {
  const wrongWords = getWrongWords();
  const badge = document.getElementById('wrong-badge');
  if (wrongWords.length > 0) {
    badge.textContent = wrongWords.length;
    badge.style.display = 'inline-block';

// ---- 页面切换 ----
document.querySelectorAll('.nav-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    const pageId = 'page-' + tab.dataset.page;
    document.getElementById(pageId).classList.add('active');

    if (tab.dataset.page === 'wrong') renderWrongList();
    if (tab.dataset.page === 'search') document.getElementById('search-input').focus();
  });
});

// ---- 错题本 ----
function renderWrongList() {
  const wrongWords = getWrongWords();
  const listDiv = document.getElementById('wrong-list');
  const emptyDiv = document.getElementById('wrong-empty');
  const reviewArea = document.getElementById('wrong-review-area');

  if (isReviewMode) return; // 复习中不刷新列表

  reviewArea.style.display = 'none';

  if (wrongWords.length === 0) {
    listDiv.innerHTML = '';
    emptyDiv.style.display = 'block';
    return;
  }

  emptyDiv.style.display = 'none';
  listDiv.innerHTML = '<div style="margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;"><span style="font-weight:600;font-size:16px;">共 ' + wrongWords.length + ' 个错题</span><button id="start-review-btn" style="padding:8px 18px;border-radius:20px;background:#f39c12;color:#fff;border:none;cursor:pointer;font-size:14px;font-family:inherit;">🔁 复习错题</button></div>';

  wrongWords.forEach((w, i) => {
    const div = document.createElement('div');
    div.className = 'wrong-item';
    div.innerHTML = '<div class="wrong-info"><div class="wrong-word">' + w.word + '</div><div class="wrong-meaning">' + w.meaning + '</div></div><div style="display:flex;align-items:center;gap:8px;"><span class="wrong-count">✗' + w.wrongCount + '</span><button class="splay-btn" data-word="' + w.word + '">🔊</button></div>';
    listDiv.appendChild(div);
  });

  // 绑定发音
  listDiv.querySelectorAll('.splay-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      speak(btn.dataset.word);
    });
  });

  // 绑定复习按钮
  const reviewBtn = document.getElementById('start-review-btn');
  if (reviewBtn) {
    reviewBtn.addEventListener('click', startReview);
  }

  // 绑定 GSAP 悬浮效果
  addHoverEffect('.wrong-item');
}

// ---- 错题复习 ----
function startReview() {
  const wrongWords = getWrongWords();
  if (wrongWords.length === 0) return;

  isReviewMode = true;
  reviewQueue = shuffle(wrongWords.map(w => {
    const full = WORD_BANK.find(wb => wb.word === w.word);
    return full || {word: w.word, meaning: w.meaning, phonetic: w.phonetic || '', pos: w.pos || ''};
  }));

  document.getElementById('wrong-list').style.display = 'none';
  document.getElementById('wrong-empty').style.display = 'none';
  document.getElementById('wrong-review-area').style.display = 'flex';

  loadReviewWord();
}

function loadReviewWord() {
  if (reviewQueue.length === 0) {
    endReview();
    return;
  }

  isAnswered = false;
  currentWord = reviewQueue.pop();

  const reviewCard = document.getElementById('review-card');

  const updateReviewContent = () => {
    document.getElementById('review-word').textContent = currentWord.word;
    document.getElementById('review-pos').textContent = currentWord.pos || '';
    document.getElementById('review-feedback-msg').textContent = '';
    document.getElementById('review-feedback-msg').className = 'msg';
    document.getElementById('review-next-btn').classList.remove('show');

    const opts = generateOptions(currentWord);
    const optsDiv = document.getElementById('review-options');
    optsDiv.innerHTML = '';
    opts.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'opt-btn';
      btn.textContent = opt;
      btn.addEventListener('click', () => reviewSelectAnswer(opt, btn));
      optsDiv.appendChild(btn);
    });
  };

  if (typeof gsap === 'undefined') {
    updateReviewContent();
    return;
  }

  gsap.to(reviewCard, {
    opacity: 0, y: -12, duration: 0.2, ease: 'power2.in',
    onComplete: () => {
      updateReviewContent();
      gsap.fromTo(reviewCard,
        { opacity: 0, y: 12 },
        { opacity: 1, y: 0, duration: 0.25, ease: 'power2.out' }
      );
      addHoverEffect('#review-options .opt-btn:not(.disabled)');
    }
  });
}

function reviewSelectAnswer(selected, btnEl) {
  if (isAnswered) return;
  isAnswered = true;

  const correct = currentWord.meaning;
  const isCorrect = selected === correct;
  const allBtns = document.querySelectorAll('#review-options .opt-btn');
  allBtns.forEach(b => b.classList.add('disabled'));

  if (isCorrect) {
    btnEl.classList.add('correct');
    document.getElementById('review-feedback-msg').textContent = '✅ 正确！已从错题本移除';
    document.getElementById('review-feedback-msg').className = 'msg correct-msg';

    // 从错题本移除
    const wrongWords = getWrongWords().filter(w => w.word !== currentWord.word);
    saveWrongWords(wrongWords);
    const stats = getStats();
    stats.wrongIds = wrongWords.map(w => w.word);
    saveStats(stats);
    updateStats();

    setTimeout(() => { loadReviewWord(); }, 1000);
  } else {
    btnEl.classList.add('wrong');
    allBtns.forEach(b => { if (b.textContent === correct) b.classList.add('show-correct'); });
    document.getElementById('review-feedback-msg').textContent = '❌ 正确答案是：' + correct;
    document.getElementById('review-feedback-msg').className = 'msg wrong-msg';
    document.getElementById('review-next-btn').classList.add('show');
  }
}

document.getElementById('review-next-btn').addEventListener('click', () => loadReviewWord());

document.getElementById('review-speak-btn').addEventListener('click', () => {
  if (!currentWord) return;
  speak(currentWord.word);
});

document.getElementById('exit-review-btn').addEventListener('click', endReview);

function endReview() {
  isReviewMode = false;
  reviewQueue = [];
  currentWord = null;
  document.getElementById('wrong-review-area').style.display = 'none';
  document.getElementById('wrong-list').style.display = 'block';
  updateStats();
  renderWrongList();
}

// ---- 搜索 ----
document.getElementById('search-input').addEventListener('input', function() {
  const query = this.value.trim().toLowerCase();
  const resultsDiv = document.getElementById('search-results');
  const noResults = document.getElementById('no-results');

  if (!query) {
    resultsDiv.innerHTML = '';
    noResults.style.display = 'none';
    return;
  }

  const matches = WORD_BANK.filter(w =>
    w.word.toLowerCase().includes(query) || w.meaning.includes(query)
  ).slice(0, 50);

  if (matches.length === 0) {
    resultsDiv.innerHTML = '';
    noResults.style.display = 'block';
    return;
  }

  noResults.style.display = 'none';
  resultsDiv.innerHTML = '';
  matches.forEach(w => {
    const div = document.createElement('div');
    div.className = 'search-item';
    div.innerHTML = '<div class="word-info"><div class="sword">' + w.word + '</div><div class="smeaning">' + w.meaning + '</div></div><button class="splay-btn" data-word="' + w.word + '">🔊</button>';
    resultsDiv.appendChild(div);
  });

  resultsDiv.querySelectorAll('.splay-btn').forEach(btn => {
    btn.addEventListener('click', () => speak(btn.dataset.word));
  });
  // 绑定 GSAP 悬浮效果
  addHoverEffect('.search-item');
});

console.log('📚 四级核心词汇库已加载：' + WORD_BANK.length + ' 个单词');

// ---- GSAP 悬浮浮起动画 ----
function addHoverEffect(selector) {
  if (typeof gsap === 'undefined') return; // GSAP 未加载时跳过
  document.querySelectorAll(selector).forEach(el => {
    // 避免重复绑定
    if (el.dataset.gsapHover) return;
    el.dataset.gsapHover = '1';

    el.addEventListener('mouseenter', () => {
      gsap.to(el, {
        y: -6,
        scale: 1.04,
        boxShadow: '0 12px 36px rgba(0,0,0,0.22)',
        duration: 0.35,
        ease: 'power2.out'
      });
    });
    el.addEventListener('mouseleave', () => {
      gsap.to(el, {
        y: 0,
        scale: 1,
        boxShadow: '0 1px 8px rgba(0,0,0,0.06)',
        duration: 0.35,
        ease: 'power2.out'
      });
    });
  });
}

// ---- GSAP 单词切换淡入淡出 ----
function animateWordTransition(updateFn) {
  const card = document.getElementById('word-card');
  if (typeof gsap === 'undefined') {
    // GSAP 未加载时直接更新，无动画
    updateFn();
    return;
  }
  // 淡出
  gsap.to(card, {
    opacity: 0,
    y: -12,
    duration: 0.2,
    ease: 'power2.in',
    onComplete: () => {
      updateFn();  // 更新卡片内容
      // 淡入
      gsap.fromTo(card,
        { opacity: 0, y: 12 },
        { opacity: 1, y: 0, duration: 0.25, ease: 'power2.out' }
      );
      // 为新的选项按钮绑定悬浮效果
      addHoverEffect('#options .opt-btn:not(.disabled)');
    }
  });
}

// 页面初始绑定悬浮效果
addHoverEffect('.word-card');
addHoverEffect('#options .opt-btn:not(.disabled)');

initSpeech();        // 预加载语音引擎，修复 Chrome 发音截断问题

}
